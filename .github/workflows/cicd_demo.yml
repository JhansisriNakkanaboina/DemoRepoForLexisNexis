name: cicd_demo

on:
  push:
    branches: [ main ]

jobs:
  registerPackage:
    runs-on: ubuntu-latest
    steps:
      - name: Dummy step
        run: echo "Register package step."

  change:
    name: Change Request Attributes
    runs-on: ubuntu-latest
    needs: registerPackage
    steps:
      - name: ServiceNow DevOps Change Attributes
        uses: ServiceNow/servicenow-devops-change@v2.0.0
        with:
          devops-integration-token: ${{ secrets.SN_DEVOPS_TOKEN }}
          instance-url: ${{ secrets.SN_INSTANCE_URL_DEVOPS }}
          tool-id: ${{ secrets.SN_ORCHESTRATION_TOOL_ID_DEVOPS }}
          context-github: ${{ toJSON(github) }}
          job-name: Change Request Attributes
          change-request: '{"setCloseCode":"true","attributes":{"short_description":"Automated Software Deployment"}}'
          interval: '100'
          timeout: '3600'
          deployment-gate: '{"environment":"deploy-gates-demo","jobName":"Deploy"}'
